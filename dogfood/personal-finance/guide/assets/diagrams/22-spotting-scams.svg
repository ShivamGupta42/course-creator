<rect x="0" y="0" width="480" height="300" rx="16" fill="#ffffff"/>
<text x="240" y="35.333333333333336" text-anchor="middle" font-size="16" font-weight="700" fill="#16223c" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Each scam tell raises the risk bar</text>
<text x="52" y="94" text-anchor="end" font-size="11" font-weight="600" fill="#33415c" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Urgency</text><rect x="60" y="80" width="220" height="18" rx="4" fill="#f1f4f9" stroke="#c7cedb" stroke-width="1.6"/><rect x="60" y="80" width="176.0" height="18" rx="4" fill="#3b6fd6"/><text x="304" y="94" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5a6677" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">4/5</text><text x="52" y="122" text-anchor="end" font-size="11" font-weight="600" fill="#33415c" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Asks for a code</text><rect x="60" y="108" width="220" height="18" rx="4" fill="#f1f4f9" stroke="#c7cedb" stroke-width="1.6"/><rect x="60" y="108" width="220.0" height="18" rx="4" fill="#e07b2e"/><text x="304" y="122" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5a6677" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">5/5</text><text x="52" y="150" text-anchor="end" font-size="11" font-weight="600" fill="#33415c" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Irreversible payment</text><rect x="60" y="136" width="220" height="18" rx="4" fill="#f1f4f9" stroke="#c7cedb" stroke-width="1.6"/><rect x="60" y="136" width="220.0" height="18" rx="4" fill="#2f9e54"/><text x="304" y="150" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5a6677" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">5/5</text><text x="52" y="178" text-anchor="end" font-size="11" font-weight="600" fill="#33415c" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">Sender mismatch</text><rect x="60" y="164" width="220" height="18" rx="4" fill="#f1f4f9" stroke="#c7cedb" stroke-width="1.6"/><rect x="60" y="164" width="132.0" height="18" rx="4" fill="#7b52d6"/><text 