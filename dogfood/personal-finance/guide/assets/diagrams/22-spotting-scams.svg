<text x="240" y="278.0833333333333" text-anchor="middle" font-size="11.5" font-weight="400" fill="#5b6677" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">No single sign is proof; two or three together mean stop and</text><text x="240" y="293.5833333333333" text-anchor="middle" font-size="11.5" font-weight="400" fill="#5b6677" font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">verify on a trusted channel.</text>
