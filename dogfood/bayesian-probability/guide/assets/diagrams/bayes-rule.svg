<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="Bayes rule decomposed: prior times likelihood over evidence gives posterior">
  <rect width="720" height="300" fill="#fbfbfd"/>
  <text x="360" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#1c2330">From what you knew to what you now believe</text>
  <rect x="40" y="90" width="150" height="70" rx="8" fill="#e8edff" stroke="#3552b5"/>
  <text x="115" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#1c2330">Prior</text>
  <text x="115" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#55607a">belief before data</text>
  <text x="205" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#3552b5">×</text>
  <rect x="225" y="90" width="150" height="70" rx="8" fill="#fff0e6" stroke="#b5642f"/>
  <text x="300" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#1c2330">Likelihood</text>
  <text x="300" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#55607a">how data fits</text>
  <text x="395" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#3552b5">÷</text>
  <rect x="415" y="90" width="150" height="70" rx="8" fill="#eef7ee" stroke="#2f7d4f"/>
  <text x="490" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#1c2330">Evidence</text>
  <text x="490" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#55607a">total prob of data</text>
  <line x1="565" y1="125" x2="620" y2="125" stroke="#3552b5" stroke-width="2" marker-end="url(#a)"/>
  <rect x="600" y="90" width="90" height="70" rx="8" fill="#efe8ff" stroke="#5a3db5"/>
  <text x="645" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1c2330">Posterior</text>
  <text x="645" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#55607a">belief after</text>
  <text x="360" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#55607a">A positive test moves belief only as far as the base rate allows.</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3552b5"/></marker></defs>
</svg>
