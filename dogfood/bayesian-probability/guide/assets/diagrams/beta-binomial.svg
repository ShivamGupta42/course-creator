<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Beta prior over a conversion rate sharpening into a Beta posterior after data">
  <rect width="720" height="320" fill="#fbfbfd"/>
  <text x="360" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#1c2330">Data sharpens a vague rate into a tight one</text>
  <line x1="80" y1="250" x2="660" y2="250" stroke="#9aa3b8" stroke-width="1.5"/>
  <line x1="80" y1="250" x2="80" y2="80" stroke="#9aa3b8" stroke-width="1.5"/>
  <text x="370" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#55607a">conversion rate θ (0 to 1)</text>
  <path d="M80,250 L660,250" fill="none" stroke="#3552b5" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="610" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#3552b5">prior Beta(1,1)</text>
  <path d="M80,250 Q200,248 250,210 Q290,150 320,110 Q350,150 400,225 Q460,250 660,250" fill="none" stroke="#5a3db5" stroke-width="3"/>
  <text x="330" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5a3db5">posterior Beta(9,33)</text>
  <line x1="320" y1="250" x2="320" y2="110" stroke="#b5642f" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="320" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b5642f">mean ≈ 0.21</text>
</svg>
